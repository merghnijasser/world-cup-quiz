<div class="container">


<div class="card">


<div class="logo">
🏆
</div>


<h1>
World Cup Quiz
</h1>


<h2>
Connexion
</h2>



<input

type="email"

placeholder="Email"

[(ngModel)]="email">


<input

type="password"

placeholder="Mot de passe"

[(ngModel)]="password">



<button
class="login"

(click)="login()">

Se connecter

</button>




<div class="separator">

OU

</div>



<button

class="google"

(click)="googleLogin()">

</button>



<p class="error">

{{error}}

</p>



<p>

Pas encore un compte ?

<a routerLink="/register">

Créer un compte

</a>


</p>



</div>


</div>
